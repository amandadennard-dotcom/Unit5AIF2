<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Vocabulary Flip Cards</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Geist:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: 'Geist', -apple-system, BlinkMacSystemFont, sans-serif;
    background: transparent;
    padding: 16px 8px;
  }

  .card-row {
    display: flex;
    gap: 12px;
    flex-wrap: wrap;
    justify-content: center;
  }

  .flip-card {
    width: 190px;
    height: 170px;
    perspective: 1000px;
    cursor: pointer;
    background: none;
    border: none;
    padding: 0;
    font-family: inherit;
  }

  .flip-inner {
    position: relative;
    width: 100%;
    height: 100%;
    transition: transform 0.5s;
    transform-style: preserve-3d;
  }

  .flip-card.flipped .flip-inner {
    transform: rotateY(180deg);
  }

  .flip-face {
    position: absolute;
    width: 100%;
    height: 100%;
    backface-visibility: hidden;
    border-radius: 12px;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    text-align: center;
    padding: 14px;
  }

  .flip-front {
    background: linear-gradient(135deg, #554CB3, #423B8C);
    color: #fff;
  }

  .flip-back {
    background: #fff;
    border: 2px solid #6A62D9;
    transform: rotateY(180deg);
  }

  .emoji {
    font-size: 1.7rem;
    margin-bottom: 6px;
  }

  .term {
    font-size: 1rem;
    font-weight: 700;
    line-height: 1.25;
  }

  .hint {
    font-size: 0.7rem;
    opacity: 0.8;
    margin-top: 8px;
  }

  .back-label {
    font-size: 0.85rem;
    font-weight: 700;
    color: #1F1976;
    margin-bottom: 6px;
  }

  .definition {
    font-size: 0.8rem;
    line-height: 1.4;
    color: #2c2c2c;
  }

  .flip-card:focus-visible .flip-inner {
    outline: 3px solid #4C42CF;
    outline-offset: 3px;
  }

  @media (prefers-reduced-motion: reduce) {
    .flip-inner { transition: none; }
  }

  .sr-only {
    position: absolute;
    left: -9999px;
    width: 1px;
    height: 1px;
    overflow: hidden;
  }
</style>
</head>
<body>

<div id="liveRegion" class="sr-only" aria-live="polite" aria-atomic="true"></div>

<div class="card-row" role="list" aria-label="Vocabulary flip cards">

  <button class="flip-card" role="listitem" aria-pressed="false" onclick="toggleCard(this)" data-term="Client" data-definition="The app asking for data">
    <div class="flip-inner">
      <div class="flip-face flip-front">
        <div class="emoji" aria-hidden="true">💻</div>
        <div class="term">Client</div>
        <div class="hint">Click to flip</div>
      </div>
      <div class="flip-face flip-back">
        <div class="back-label">Client</div>
        <div class="definition">The app asking for data</div>
      </div>
    </div>
  </button>

  <button class="flip-card" role="listitem" aria-pressed="false" onclick="toggleCard(this)" data-term="Server" data-definition="The service that stores and sends data">
    <div class="flip-inner">
      <div class="flip-face flip-front">
        <div class="emoji" aria-hidden="true">🗄️</div>
        <div class="term">Server</div>
        <div class="hint">Click to flip</div>
      </div>
      <div class="flip-face flip-back">
        <div class="back-label">Server</div>
        <div class="definition">The service that stores and sends data</div>
      </div>
    </div>
  </button>

  <button class="flip-card" role="listitem" aria-pressed="false" onclick="toggleCard(this)" data-term="Request" data-definition="A message asking for data">
    <div class="flip-inner">
      <div class="flip-face flip-front">
        <div class="emoji" aria-hidden="true">📤</div>
        <div class="term">Request</div>
        <div class="hint">Click to flip</div>
      </div>
      <div class="flip-face flip-back">
        <div class="back-label">Request</div>
        <div class="definition">A message asking for data</div>
      </div>
    </div>
  </button>

  <button class="flip-card" role="listitem" aria-pressed="false" onclick="toggleCard(this)" data-term="Response" data-definition="A message that sends data back">
    <div class="flip-inner">
      <div class="flip-face flip-front">
        <div class="emoji" aria-hidden="true">📥</div>
        <div class="term">Response</div>
        <div class="hint">Click to flip</div>
      </div>
      <div class="flip-face flip-back">
        <div class="back-label">Response</div>
        <div class="definition">A message that sends data back</div>
      </div>
    </div>
  </button>

</div>

<script>
  // Match this to the CSS transition duration so the live region
  // only announces once the flip animation has actually finished,
  // rather than mid-flip while the new face isn't visible yet.
  var FLIP_DURATION = 500;

  var reduceMotion = window.matchMedia('(prefers-reduced-motion: reduce)').matches;

  function toggleCard(card) {
    var isFlipping = !card.classList.contains('flipped');
    card.classList.toggle('flipped');
    card.setAttribute('aria-pressed', isFlipping);

    var delay = reduceMotion ? 0 : FLIP_DURATION;
    var term = card.getAttribute('data-term');
    var definition = card.getAttribute('data-definition');
    var liveRegion = document.getElementById('liveRegion');

    // Clear first so repeated identical announcements still fire
    liveRegion.textContent = '';

    setTimeout(function () {
      liveRegion.textContent = isFlipping
        ? term + '. Definition: ' + definition
        : term + '. Showing term side.';
    }, delay);
  }
</script>

</body>
</html>
